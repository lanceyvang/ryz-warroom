<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#06090a" />
  <title>RYZ WAR ROOM</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/art/emblem.png" />
  <link rel="apple-touch-icon" href="/art/emblem.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>

  <!-- login gate -->
  <div id="gate" class="gate hidden">
    <img src="/art/emblem.png" alt="RyZ emblem"
         onerror="this.outerHTML='<svg width=108 height=108 viewBox=&quot;0 0 24 24&quot; fill=none stroke=&quot;#3ef0c8&quot; stroke-width=1.5><path d=&quot;M12 2l9 5v6c0 5-3.6 9-9 10-5.4-1-9-5-9-10V7z&quot;/></svg>'" />
    <h1>RYZ WAR ROOM</h1>
    <p>Identify Operator</p>
    <form id="gate-form" style="display:contents">
      <input id="gate-name" type="text" placeholder="CALLSIGN" autocomplete="username" autofocus />
      <div id="gate-err" class="err"></div>
      <button type="submit" class="btn">Authenticate</button>
    </form>
  </div>

  <div id="app" class="hidden">

    <header class="hud">
      <img class="hud-emblem" src="/art/emblem.png" alt="RyZ emblem" />
      <div class="hud-title">
        <h1>RYZ S129</h1>
        <div class="sub">War Room · S6 Lost Rainforest</div>
      </div>
      <div class="hud-chip" id="hud-user">—</div>
    </header>

    <!-- hero: holographic theatre -->
    <section class="hero" id="top">
      <div id="holo"></div>
      <div class="hero-readout">
        <div class="label">A-Squad Power</div>
        <div class="value">0.0<small>M</small></div>
        <div class="meta" id="hero-meta"></div>
      </div>
    </section>

    <!-- divisions -->
    <section class="module reveal" id="sec-div" style="animation-delay:0.1s">
      <div class="module-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--holo)" stroke-width="1.8"><path d="M12 3l8 4v5c0 4.5-3.2 8-8 9-4.8-1-8-4.5-8-9V7z"/></svg>
        <h2>Divisions</h2><span class="tag">TOP OPERATIVE</span>
      </div>
      <div class="module-body divisions" id="divisions"></div>
    </section>

    <!-- power trajectory -->
    <section class="module reveal" id="sec-chart" style="animation-delay:0.2s">
      <div class="module-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--holo)" stroke-width="1.8"><path d="M3 20h18M5 16l4-5 4 3 6-8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h2>Power Trajectory</h2><span class="tag">WEEKLY RECON</span>
      </div>
      <div class="module-body chart-wrap" id="chart"></div>
    </section>

    <!-- roster -->
    <section class="module reveal" id="sec-roster" style="animation-delay:0.3s">
      <div class="module-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--holo)" stroke-width="1.8"><circle cx="9" cy="8" r="3.4"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6M16 4.6a3.4 3.4 0 010 6.8M17.5 14.4c2.1.8 3.5 2.9 3.5 5.6"/></svg>
        <h2>Operatives</h2><span class="tag" id="roster-count"></span>
      </div>
      <div class="module-body" id="roster"></div>
    </section>

    <!-- my loadout -->
    <section class="module reveal" id="sec-squads" style="animation-delay:0.4s">
      <div class="module-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--holo)" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M8 5v14M16 5v14"/></svg>
        <h2>My Loadout</h2><span class="tag">SQUADS A–D</span>
      </div>
      <div class="module-body squad-grid" id="squads"></div>
    </section>

    <!-- supply draw -->
    <section class="module reveal" id="sec-draw" style="animation-delay:0.5s">
      <div class="module-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="1.8"><rect x="4" y="8" width="16" height="12" rx="1"/><path d="M4 12h16M12 8v12M8 8V5.5A1.5 1.5 0 019.5 4h5A1.5 1.5 0 0116 5.5V8"/></svg>
        <h2>Supply Draw</h2><span class="tag">RANDOM REQUISITION</span>
      </div>
      <div class="module-body">
        <div class="draw-result" id="draw-result">Spin to requisition a lucky operative.</div>
        <button class="btn amber" id="draw-btn">Deploy Supply Drop</button>
      </div>
    </section>

  </div>

  <!-- quick-jump status bar (anchors, not tabs) -->
  <nav class="statusbar">
    <a href="#top" class="hot">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 12L18 5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>
      Theatre</a>
    <a href="#sec-chart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 20h18M5 16l4-5 4 3 6-8"/></svg>
      Recon</a>
    <a href="#sec-roster">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.4"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      Roster</a>
    <a href="#sec-draw">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="8" width="16" height="12" rx="1"/><path d="M4 12h16M12 8v12"/></svg>
      Supply</a>
  </nav>

  <script type="module" src="/app.js"></script>
</body>
</html>
